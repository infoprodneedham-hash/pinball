<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Space-Age Neon Pinball</title>
    <style>
        :root {
            --neon-cyan: #00f3ff;
            --neon-magenta: #ff0077;
            --neon-purple: #9d00ff;
            --neon-green: #39ff14;
            --neon-yellow: #ffde00;
            --bg-dark: #03030c;
        }

        * {
            box-sizing: border-box;
            user-select: none;
            -webkit-user-select: none;
            touch-action: none;
        }

        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-dark);
            color: #fff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            min-height: 100vh;
            overflow: hidden;
        }

        #ui-header {
            width: 100%;
            max-width: 420px;
            display: flex;
            justify-content: space-between;
            padding: 15px 20px 5px 20px;
            font-size: 1.1rem;
            letter-spacing: 2px;
            font-weight: bold;
            text-shadow: 0 0 8px var(--neon-cyan);
            color: var(--neon-cyan);
        }

        #game-container {
            position: relative;
            width: 100%;
            max-width: 420px;
            height: 72vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        canvas {
            background: radial-gradient(circle at 50% 30%, #0f0a2a 0%, #03030c 100%);
            border: 3px solid var(--neon-purple);
            box-shadow: 0 0 20px var(--neon-purple), inset 0 0 20px rgba(157, 0, 255, 0.3);
            border-radius: 20px;
            max-width: 100%;
            max-height: 100%;
        }

        #controls {
            width: 100%;
            max-width: 420px;
            display: grid;
            grid-template-columns: 1fr 1.1fr 1fr;
            gap: 12px;
            padding: 10px 15px 20px 15px;
        }

        .btn {
            background: rgba(10, 5, 30, 0.85);
            border: 2px solid var(--neon-cyan);
            border-radius: 12px;
            color: #fff;
            padding: 18px 0;
            font-size: 1.1rem;
            font-weight: 900;
            letter-spacing: 1px;
            text-align: center;
            box-shadow: 0 0 10px rgba(0, 243, 255, 0.2);
            transition: all 0.1s ease;
        }

        .btn:active {
            background: var(--neon-cyan);
            color: #000;
            box-shadow: 0 0 25px var(--neon-cyan);
        }

        #btn-plunger {
            border-color: var(--neon-magenta);
            color: #fff;
            box-shadow: 0 0 10px rgba(255, 0, 119, 0.2);
        }

        #btn-plunger:active {
            background: var(--neon-magenta);
            color: #000;
            box-shadow: 0 0 25px var(--neon-magenta);
        }

        #game-over-screen {
            display: none;
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(3, 3, 12, 0.95);
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 10;
            border-radius: 20px;
        }

        #game-over-screen h2 {
            color: var(--neon-magenta);
            font-size: 2.8rem;
            text-shadow: 0 0 20px var(--neon-magenta);
            margin: 0 0 10px 0;
            letter-spacing: 3px;
        }
        
        #game-over-screen p {
            color: #fff;
            font-size: 1.2rem;
            margin-bottom: 30px;
        }

        #restart-btn {
            padding: 12px 30px;
            font-size: 1.2rem;
            font-weight: bold;
            background: transparent;
            border: 2px solid var(--neon-green);
            color: var(--neon-green);
            border-radius: 30px;
            text-shadow: 0 0 5px var(--neon-green);
            box-shadow: 0 0 15px rgba(57, 255, 20, 0.3);
            cursor: pointer;
        }
    </style>
</head>
<body>

    <div id="ui-header">
        <div id="score-display">SCORE: 000000</div>
        <div id="balls-display">BALLS: 5</div>
    </div>

    <div id="game-container">
        <canvas id="field" width="400" height="600"></canvas>
        
        <div id="game-over-screen">
            <h2>GAME OVER</h2>
            <p id="final-score">FINAL SCORE: 000000</p>
            <button id="restart-btn">LAUNCH AGAIN</button>
        </div>
    </div>

    <div id="controls">
        <div class="btn" id="btn-left">LEFT</div>
        <div class="btn" id="btn-plunger">LAUNCH</div>
        <div class="btn" id="btn-right">RIGHT</div>
    </div>

    <script>
        const canvas = document.getElementById('field');
        const ctx = canvas.getContext('2d');

        // Game Metrics & State
        let score = 0;
        let ballsLeft = 5;
        let gameOver = false;
        const gravity = 0.25;
        const SUB_STEPS = 6; // High performance micro-steps calculation layout

        // Control Switches
        let leftFlipperActive = false;
        let rightFlipperActive = false;
        let plungerTension = 0;
        let isPullingPlunger = false;

        const colors = {
            cyan: '#00f3ff',
            magenta: '#ff0077',
            purple: '#9d00ff',
            green: '#39ff14',
            yellow: '#ffde00',
            white: '#ffffff'
        };

        // Reactive Particle Engine
        let particles = [];
        function spawnParticles(x, y, color, count = 6) {
            for(let i=0; i<count; i++) {
                particles.push({
                    x: x, y: y,
                    vx: (Math.random() - 0.5) * 5,
                    vy: (Math.random() - 0.5) * 5,
                    radius: Math.random() * 2.5 + 1,
                    alpha: 1,
                    color: color
                });
            }
        }

        // Vector Line Segment Class
        class Wall {
            constructor(x1, y1, x2, y2, color, isSlingshot = false) {
                this.x1 = x1; this.y1 = y1;
                this.x2 = x2; this.y2 = y2;
                this.color = color;
                this.isSlingshot = isSlingshot;
                this.flashTimer = 0;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.moveTo(this.x1, this.y1);
                ctx.lineTo(this.x2, this.y2);
                ctx.lineWidth = this.flashTimer > 0 ? 6 : 3;
                ctx.strokeStyle = this.flashTimer > 0 ? colors.white : this.color;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.flashTimer > 0 ? 20 : 6;
                ctx.stroke();
                ctx.restore();
                if(this.flashTimer > 0) this.flashTimer--;
            }
        }

        // Fixed Physics Ball Object
        class Ball {
            constructor() {
                this.trail = [];
                this.reset();
            }

            reset() {
                this.x = 380; 
                this.y = 540;
                this.vx = 0;
                this.vy = 0;
                this.radius = 9;
                this.trail = [];
            }

            // Updates base frame states (like trails)
            recordTrail() {
                this.trail.push({x: this.x, y: this.y});
                if(this.trail.length > 6) this.trail.shift();
            }

            draw() {
                // Render Speed Trail
                for(let i=0; i<this.trail.length; i++) {
                    ctx.beginPath();
                    ctx.arc(this.trail[i].x, this.trail[i].y, this.radius * (i/this.trail.length), 0, Math.PI*2);
                    ctx.fillStyle = `rgba(0, 243, 255, ${0.12 * (i/this.trail.length)})`;
                    ctx.fill();
                }

                // Render Physical Ball
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                let grad = ctx.createRadialGradient(this.x-3, this.y-3, 1, this.x, this.y, this.radius);
                grad.addColorStop(0, '#ffffff');
                grad.addColorStop(1, '#a5d8ff');
                ctx.fillStyle = grad;
                ctx.shadowColor = colors.cyan;
                ctx.shadowBlur = 10;
                ctx.fill();
                ctx.restore();
            }
        }

        // Bumper Class
        class Bumper {
            constructor(x, y, radius, points, color) {
                this.x = x; this.y = y;
                this.radius = radius;
                this.points = points;
                this.color = color;
                this.flash = 0;
            }

            draw() {
                ctx.save();
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.flash > 0 ? 'rgba(255,255,255,0.4)' : 'rgba(10,5,30,0.6)';
                ctx.fill();
                ctx.strokeStyle = this.flash > 0 ? colors.white : this.color;
                ctx.lineWidth = 3;
                ctx.shadowColor = this.color;
                ctx.shadowBlur = this.flash > 0 ? 25 : 12;
                ctx.stroke();

                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius * 0.35, 0, Math.PI*2);
                ctx.fillStyle = this.color;
                ctx.fill();

                if(this.flash > 0) this.flash--;
                ctx.restore();
            }

            checkCollision(ball) {
                let dx = ball.x - this.x;
                let dy = ball.y - this.y;
                let distance = Math.sqrt(dx * dx + dy * dy);

                if (distance < ball.radius + this.radius) {
                    let nx = dx / distance;
                    let ny = dy / distance;

                    // Extrude outside bounding radius instantly
                    ball.x = this.x + nx * (ball.radius + this.radius + 0.5);

                    let kickForce = 6.0;
                    let dot = ball.vx * nx + ball.vy * ny;
                    ball.vx = (ball.vx - 2 * dot * nx) + nx * kickForce;
                    ball.vy = (ball.vy - 2 * dot * ny) + ny * kickForce;

                    this.flash = 6;
                    score += this.points;
                    spawnParticles(this.x + nx*this.radius, this.y + ny*this.radius, this.color);
                    updateUI();
                }
            }
        }

        // Mechanical Flippers
        class Flipper {
            constructor(x, y, length, baseAngle, targetAngle, isLeft) {
                this.x = x; this.y = y;
                this.length = length;
                this.baseAngle = baseAngle * Math.PI / 180;
                this.targetAngle = targetAngle * Math.PI / 180;
                this.currentAngle = this.baseAngle;
                this.isLeft = isLeft;
                this.thickness = 8;
            }

            update(isActive) {
                let velocity = 0.35; 
                if (isActive) {
                    if (this.isLeft) this.currentAngle = Math.max(this.targetAngle, this.currentAngle - velocity);
                    else this.currentAngle = Math.min(this.targetAngle, this.currentAngle + velocity);
                } else {
                    if (this.isLeft) this.currentAngle = Math.min(this.baseAngle, this.currentAngle + velocity * 0.4);
                    else this.currentAngle = Math.max(this.baseAngle, this.currentAngle - velocity * 0.4);
                }
            }

            draw() {
                let tipX = this.x + Math.cos(this.currentAngle) * this.length;
                let tipY = this.y + Math.sin(this.currentAngle) * this.length;

                ctx.save();
                ctx.strokeStyle = colors.cyan;
                ctx.lineWidth = this.thickness;
                ctx.lineCap = 'round';
                ctx.shadowColor = colors.cyan;
                ctx.shadowBlur = 12;
                ctx.beginPath();
                ctx.moveTo(this.x, this.y);
                ctx.lineTo(tipX, tipY);
                ctx.stroke();
                ctx.restore();
            }

            checkCollision(ball) {
                let x1 = this.x;
                let y1 = this.y;
                let x2 = this.x + Math.cos(this.currentAngle) * this.length;
                let y2 = this.y + Math.sin(this.currentAngle) * this.length;

                let l2 = Math.pow(x2 - x1, 2) + Math.pow(y2 - y1, 2);
                let t = ((ball.x - x1) * (x2 - x1) + (ball.y - y1) * (y2 - y1)) / l2;
                t = Math.max(0, Math.min(1, t));

                let projX = x1 + t * (x2 - x1);
                let projY = y1 + t * (y2 - y1);

                let dx = ball.x - projX;
                let dy = ball.y - projY;
                let dist = Math.sqrt(dx * dx + dy * dy);

                if (dist < ball.radius + this.thickness / 2) {
                    let nx = dx / dist;
                    let ny = dy / dist;

                    ball.x = projX + nx * (ball.radius + this.thickness / 2 + 0.5);

                    let dot = ball.vx * nx + ball.vy * ny;
                    if (dot < 0) {
                        ball.vx = ball.vx - 2 * dot * nx;
                        ball.vy = ball.vy - 2 * dot * ny;

                        // Give clean dynamic upward boost if flipper is moving upward
                        if ((this.isLeft && leftFlipperActive && ball.vy > -6) || (!this.isLeft && rightFlipperActive && ball.vy > -6)) {
                            let speedModifier = (1.3 - t * 0.6); // Tip creates maximum speed
                            ball.vy = -12 * speedModifier;
                            ball.vx += this.isLeft ? 3 : -3;
                            spawnParticles(ball.x, ball.y, colors.cyan, 3);
                        }
                    }
                }
            }
        }

        // Initialize Elements
        const ball = new Ball();
        const bumpers = [
            new Bumper(130, 150, 24, 100, colors.magenta),
            new Bumper(230, 150, 24, 100, colors.magenta),
            new Bumper(180, 225, 28, 200, colors.green),
            new Bumper(70, 280, 16, 150, colors.yellow),
            new Bumper(290, 280, 16, 150, colors.yellow)
        ];

        const leftFlipper = new Flipper(95, 520, 68, 26, -24, true);
        const rightFlipper = new Flipper(265, 520, 68, 154, 204, false);

        const walls = [
            // Outer Main Frame Walls
            new Wall(0, 140, 0, 600, colors.purple),
            new Wall(360, 175, 360, 600, colors.purple), // Launcher Left Barrier Line
            new Wall(400, 140, 400, 600, colors.purple), // Launcher Right Exterior Line
            
            // Smoother Curving Top Track
            new Wall(0, 140, 45, 75, colors.purple),
            new Wall(45, 75, 130, 25, colors.purple),
            new Wall(130, 25, 270, 25, colors.purple),
            new Wall(270, 25, 355, 75, colors.purple),
            new Wall(355, 75, 400, 140, colors.purple),

            // Lower Outlanes & Guides
            new Wall(0, 420, 55, 475, colors.purple),
            new Wall(55, 475, 55, 530, colors.purple),
            new Wall(360, 420, 305, 475, colors.purple),
            new Wall(305, 475, 305, 530, colors.purple),

            // Left Triangular Slingshot
            new Wall(55, 395, 95, 465, colors.green, true),
            new Wall(95, 465, 55, 465, colors.green),
            new Wall(55, 465, 55, 395, colors.green),

            // Right Triangular Slingshot
            new Wall(305, 395, 265, 465, colors.green, true),
            new Wall(265, 465, 305, 465, colors.green),
            new Wall(305, 465, 305, 395, colors.green)
        ];

        // Structural Vector Collision Handler Routine
        function handleWallCollisions(ball, wall) {
            // Bypass chute friction dampening lines entirely while ball is rocketing upward
            if (ball.x > 355 && ball.y > 150 && ball.vy < 0) return;

            let x1 = wall.x1, y1 = wall.y1, x2 = wall.x2, y2 = wall.y2;
            let dx = x2 - x1;
            let dy = y2 - y1;
            let l2 = dx * dx + dy * dy;
            if (l2 === 0) return;

            let t = ((ball.x - x1) * dx + (ball.y - y1) * dy) / l2;
            t = Math.max(0, Math.min(1, t));

            let projX = x1 + t * dx;
            let projY = y1 + t * dy;

            let distDx = ball.x - projX;
            let distDy = ball.y - projY;
            let dist = Math.sqrt(distDx * distDx + distDy * distDy);

            if (dist < ball.radius) {
                let nx = distDx / (dist || 1);
                let ny = distDy / (dist || 1);

                // Displace ball cleanly outside line barrier
                ball.x = projX + nx * (ball.radius + 0.5);

                let dot = ball.vx * nx + ball.vy * ny;
                if (dot < 0) { 
                    let bounceFactor = 0.50;
                    ball.vx = (ball.vx - 2 * dot * nx) * bounceFactor;
                    ball.vy = (ball.vy - 2 * dot * ny) * bounceFactor;

                    // Slingshot Reactive Impulse Kick
                    if (wall.isSlingshot) {
                        let kick = 5.0;
                        ball.vx += nx * kick;
                        ball.vy += ny * kick;
                        wall.flashTimer = 8;
                        score += 75;
                        spawnParticles(projX, projY, wall.color);
                        updateUI();
                    }
                }
            }
        }

        function updateUI() {
            document.getElementById('score-display').innerText = `SCORE: ${String(score).padStart(6, '0')}`;
            document.getElementById('balls-display').innerText = `BALLS: ${ballsLeft}`;
        }

        function endGame() {
            gameOver = true;
            document.getElementById('final-score').innerText = `FINAL SCORE: ${String(score).padStart(6, '0')}`;
            document.getElementById('game-over-screen').style.display = 'flex';
        }

        function restartGame() {
            score = 0;
            ballsLeft = 5;
            gameOver = false;
            document.getElementById('game-over-screen').style.display = 'none';
            ball.reset();
            updateUI();
        }

        // Standardized Main Loop Core Logic Engine
        function update() {
            if (gameOver) return;

            // 1. Calculate environmental forces and hard speed caps once per frame loop
            ball.vy += gravity;
            ball.vx = Math.max(-13, Math.min(13, ball.vx));
            ball.vy = Math.max(-18, Math.min(15, ball.vy)); // Perfect maximum speed ceiling

            leftFlipper.update(leftFlipperActive);
            rightFlipper.update(rightFlipperActive);

            // 2. Multi-step position checking loops (breaks velocity into 6 tiny safety increments)
            for(let step=0; step < SUB_STEPS; step++) {
                ball.x += ball.vx / SUB_STEPS;
                ball.y += ball.vy / SUB_STEPS;

                // Launch Track Bottom containment floor check inside step
                if (ball.x > 360 && ball.y + ball.radius > 575) {
                    ball.y = 575 - ball.radius;
                    ball.vy = 0;
                    ball.vx = 0;
                }

                // Process collisions at micro-intervals
                for (let wall of walls) {
                    handleWallCollisions(ball, wall);
                }
                for (let bumper of bumpers) {
                    bumper.checkCollision(ball);
                }
                leftFlipper.checkCollision(ball);
                rightFlipper.checkCollision(ball);
            }

            // Capture Frame trail state
            ball.recordTrail();

            // Handle Launcher Plunger compression system state
            if (isPullingPlunger) {
                plungerTension = Math.min(plungerTension + 2.0, 40);
            } else if (plungerTension > 0) {
                if (ball.x > 360 && ball.y >= 520) {
                    ball.vy = -plungerTension * 0.45; // Perfectly balanced vertical liftoff speed
                    ball.vx = 0;
                    spawnParticles(ball.x, ball.y+10, colors.magenta, 6);
                }
                plungerTension = 0;
            }

            // Edge Boundary Drain check
            if (ball.y > canvas.height + 20) {
                ballsLeft--;
                updateUI();
                if (ballsLeft <= 0) endGame();
                else ball.reset();
            }

            // Clean expiring visual elements
            for (let i = particles.length - 1; i >= 0; i--) {
                let p = particles[i];
                p.x += p.vx; p.y += p.vy;
                p.alpha -= 0.04;
                if (p.alpha <= 0) particles.splice(i, 1);
            }
        }

        // Frame Graphic Output Manager
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Render Static Board Vectors
            for (let wall of walls) wall.draw();

            // Render Bumpers
            for (let bumper of bumpers) bumper.draw();

            // Render Mechanical Flippers
            leftFlipper.draw();
            rightFlipper.draw();

            // Render Active Particles
            for(let p of particles) {
                ctx.save();
                ctx.globalAlpha = p.alpha;
                ctx.beginPath();
                ctx.arc(p.x, p.y, p.radius, 0, Math.PI*2);
                ctx.fillStyle = p.color;
                ctx.shadowColor = p.color;
                ctx.shadowBlur = 6;
                ctx.fill();
                ctx.restore();
            }

            // Render Mechanical Plunger Spring State
            ctx.save();
            ctx.fillStyle = colors.magenta;
            ctx.shadowColor = colors.magenta;
            ctx.shadowBlur = 10;
            ctx.fillRect(374, 575 + plungerTension, 16, 25 - plungerTension * 0.5);
            ctx.restore();

            // Render Main Ball Entity
            ball.draw();
        }

        function loop() {
            update();
            draw();
            requestAnimationFrame(loop);
        }

        // Interface Touch Controls Bindings
        const btnLeft = document.getElementById('btn-left');
        const btnRight = document.getElementById('btn-right');
        const btnPlunger = document.getElementById('btn-plunger');

        btnLeft.addEventListener('touchstart', (e) => { e.preventDefault(); leftFlipperActive = true; });
        btnLeft.addEventListener('touchend', (e) => { e.preventDefault(); leftFlipperActive = false; });
        btnLeft.addEventListener('mousedown', () => leftFlipperActive = true);
        btnLeft.addEventListener('mouseup', () => leftFlipperActive = false);

        btnRight.addEventListener('touchstart', (e) => { e.preventDefault(); rightFlipperActive = true; });
        btnRight.addEventListener('touchend', (e) => { e.preventDefault(); rightFlipperActive = false; });
        btnRight.addEventListener('mousedown', () => rightFlipperActive = true);
        btnRight.addEventListener('mouseup', () => rightFlipperActive = false);

        btnPlunger.addEventListener('touchstart', (e) => { e.preventDefault(); isPullingPlunger = true; });
        btnPlunger.addEventListener('touchend', (e) => { e.preventDefault(); isPullingPlunger = false; });
        btnPlunger.addEventListener('mousedown', () => isPullingPlunger = true);
        btnPlunger.addEventListener('mouseup', () => isPullingPlunger = false);

        // Standard Keyboard fallback binds
        window.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') leftFlipperActive = true;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') rightFlipperActive = true;
            if (e.key === 'ArrowDown' || e.key === ' ') isPullingPlunger = true;
        });

        window.addEventListener('keyup', (e) => {
            if (e.key === 'ArrowLeft' || e.key.toLowerCase() === 'a') leftFlipperActive = false;
            if (e.key === 'ArrowRight' || e.key.toLowerCase() === 'd') rightFlipperActive = false;
            if (e.key === 'ArrowDown' || e.key === ' ') isPullingPlunger = false;
        });

        document.getElementById('restart-btn').addEventListener('click', restartGame);

        // Core App Initialization
        updateUI();
        loop();
    </script>
</body>
</html>
